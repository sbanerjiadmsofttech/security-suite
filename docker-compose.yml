version: '3.8'

services:
  # Core REST API Scan Engine
  api-core:
    build: .
    container_name: secsuite_api_core
    command: python cli/main.py serve
    volumes:
      - .:/app
      - secsuite_data:/root/.secsuite
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
    restart: unless-stopped

  # Visual Front-end Dashboard Layout Panel
  ui-dashboard:
    build: .
    container_name: secsuite_ui_dashboard
    command: python cli/main.py dashboard
    volumes:
      - .:/app
    ports:
      - "8080:8080"
    environment:
      - PYTHONPATH=/app
    depends_on:
      - api-core
    restart: unless-stopped

volumes:
  secsuite_data:
    driver: local