services:
  web:
    build: .
    command: uvicorn dashboard.main:app --host 0.0.0.0 --port 8000 --reload
    ports: ["8000:8000"]
    volumes: [.:/app]
  redis:
    image: redis:alpine
  worker:
    build: .
    command: celery -A dashboard.tasks worker --loglevel=info
    volumes: [.:/app]
    depends_on: [redis]